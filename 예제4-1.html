<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>태그 셀렉터 만들기</title>
    <style>
        body{
            background: coral;
            color: blue;
        }
        h3{
            color: blueviolet;
            text-align: right;
        }
        .kim{
            background: rgb(235, 148, 148);
        }
        span{
            background: green;
        }
        .good{
            background: darkturquoise;
        }
    </style>
</head>
<body>
    <h3>소연재</h3>
    <hr>
    <p>저는 체조 선수 소연재입니다. <span>음악</span>음악을 들으면서 책읽기를 좋아합니다. <span class="kim">김치 찌개</span>와<span class="good">막국수</span>를 무척 좋아합니다.</p>
</body>
</html>
